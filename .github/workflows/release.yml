name: CI / Release

on:
  push:
    tags: ["v*"]
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  # ── CI: test + lint on every push/PR ──────────────────────────────
  ci:
    name: Test & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fust
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: fust

      - name: Run tests
        run: cargo test

      - name: Run clippy
        run: cargo clippy -- -D warnings

  # ── Build: cross-compile for 4 targets ────────────────────────────
  build:
    name: Build ${{ matrix.target }}
    needs: ci
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            use_cross: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            use_cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            use_cross: false
          - target: aarch64-apple-darwin
            os: macos-latest
            use_cross: false
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: fust
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: fust

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --locked

      - name: Build (cross)
        if: matrix.use_cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Build (cargo)
        if: "!matrix.use_cross"
        run: cargo build --release --target ${{ matrix.target }}

      - name: Strip binary
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            llvm-strip -s target/${{ matrix.target }}/release/fust
          else
            strip -s target/${{ matrix.target }}/release/fust
          fi

      - name: Package tarball
        run: |
          tar -czf fust-${{ matrix.target }}.tar.gz -C target/${{ matrix.target }}/release fust
          shasum -a 256 fust-${{ matrix.target }}.tar.gz > fust-${{ matrix.target }}.sha256

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fust-${{ matrix.target }}
          path: |
            fust/fust-${{ matrix.target }}.tar.gz
            fust/fust-${{ matrix.target }}.sha256

  # ── Release: publish GitHub Release ───────────────────────────────
  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Merge checksums
        run: |
          cat artifacts/*.sha256 > checksums.txt
          echo "--- Checksums ---"
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            artifacts/*.tar.gz
            checksums.txt
