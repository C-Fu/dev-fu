name: CI / Release

on:
  push:
    tags: ["v*"]
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Test & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fust
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: fust

      - name: Run tests
        run: cargo test

      - name: Run clippy
        run: cargo clippy -- -D warnings

  build:
    name: Build ${{ matrix.target }}
    needs: ci
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            use_zig: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            use_zig: true
          - target: armv7-unknown-linux-musleabihf
            os: ubuntu-latest
            use_zig: true
          - target: x86_64-apple-darwin
            os: macos-latest
            use_zig: false
          - target: aarch64-apple-darwin
            os: macos-latest
            use_zig: false
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: fust
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: fust

      - name: Install zig
        if: matrix.use_zig
        uses: mlugg/setup-zig@v1
        with:
          version: "0.13.0"

      - name: Install cargo-zigbuild
        if: matrix.use_zig
        run: cargo install cargo-zigbuild --locked

      - name: Build (zigbuild)
        if: matrix.use_zig
        run: cargo zigbuild --release --target ${{ matrix.target }}

      - name: Build (cargo)
        if: "!matrix.use_zig"
        run: cargo build --release --target ${{ matrix.target }}

      - name: Strip binary
        run: |
          if [ "${{ matrix.use_zig }}" = "true" ]; then
            llvm-strip -s target/${{ matrix.target }}/release/fust
          else
            strip target/${{ matrix.target }}/release/fust
          fi

      - name: Package tarball
        run: |
          tar -czf fust-${{ matrix.target }}.tar.gz -C target/${{ matrix.target }}/release fust
          shasum -a 256 fust-${{ matrix.target }}.tar.gz > fust-${{ matrix.target }}.sha256

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fust-${{ matrix.target }}
          path: |
            fust/fust-${{ matrix.target }}.tar.gz
            fust/fust-${{ matrix.target }}.sha256

  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Merge checksums
        run: |
          cat artifacts/*.sha256 > checksums.txt
          echo "--- Checksums ---"
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            artifacts/*.tar.gz
            checksums.txt
